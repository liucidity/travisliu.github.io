<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog – Travis Liu</title>
  <meta name="description" content="Thoughts on development, projects, and things Travis Liu is learning." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0f0f13; --card:rgba(255,255,255,0.03); --border:rgba(255,255,255,0.08);
      --text:#f0f0f0; --muted:#9ca3af; --purple:#a78bfa; --blue:#60a5fa; --radius:16px;
    }
    html { scroll-behavior: smooth; }
    body { font-family:'Inter',-apple-system,sans-serif; background:var(--bg); color:var(--text); line-height:1.6; min-height:100vh; }
    a { color:inherit; text-decoration:none; }

    nav {
      display:flex; justify-content:space-between; align-items:center;
      padding:18px 60px; background:rgba(15,15,19,0.80);
      backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
      border-bottom:1px solid var(--border);
      position:sticky; top:0; z-index:100;
    }
    .nav-logo {
      font-size:1.05rem; font-weight:700;
      background:linear-gradient(120deg,var(--purple),var(--blue));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .nav-links { display:flex; gap:28px; list-style:none; align-items:center; }
    .nav-links a { font-size:0.875rem; color:var(--muted); transition:color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color:var(--text); }
    .nav-cta {
      background:linear-gradient(135deg,#7c3aed,#3b82f6);
      color:#fff !important; padding:8px 18px !important;
      border-radius:8px; font-weight:600 !important; font-size:0.8rem !important;
    }

    .page-header { max-width:860px; margin:0 auto; padding:80px 24px 48px; }
    .page-label { font-size:0.75rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--purple); margin-bottom:12px; display:block; }
    .page-title { font-size:clamp(2rem,5vw,3rem); font-weight:800; letter-spacing:-0.025em; margin-bottom:14px; }
    .page-sub { font-size:1rem; color:var(--muted); max-width:520px; }

    .tag-filter { max-width:860px; margin:0 auto 40px; padding:0 24px; display:flex; gap:10px; flex-wrap:wrap; }
    .filter-btn {
      background:var(--card); border:1px solid var(--border);
      border-radius:999px; padding:6px 16px;
      font-size:0.78rem; color:var(--muted); cursor:pointer;
      transition:all 0.2s; font-family:inherit;
    }
    .filter-btn:hover { border-color:rgba(167,139,250,0.3); color:var(--text); }
    .filter-btn.active { background:rgba(167,139,250,0.12); border-color:rgba(167,139,250,0.4); color:var(--purple); }

    .post-list { max-width:860px; margin:0 auto; padding:0 24px 100px; display:flex; flex-direction:column; gap:16px; }
    .post-card {
      background:var(--card); border:1px solid var(--border);
      border-radius:var(--radius); padding:28px 32px;
      display:flex; align-items:flex-start; justify-content:space-between; gap:24px;
      transition:border-color 0.25s, transform 0.25s;
    }
    .post-card:hover { border-color:rgba(167,139,250,0.4); transform:translateX(4px); }
    .post-card-left { flex:1; }
    .post-meta { display:flex; gap:12px; align-items:center; margin-bottom:10px; flex-wrap:wrap; }
    .post-date { font-size:0.75rem; color:var(--muted); }
    .post-tag-chip { background:rgba(167,139,250,0.10); color:var(--purple); font-size:0.7rem; padding:2px 10px; border-radius:999px; }
    .post-title { font-size:1.15rem; font-weight:700; margin-bottom:8px; line-height:1.35; }
    .post-excerpt { font-size:0.875rem; color:var(--muted); line-height:1.65; }
    .post-arrow { font-size:1.2rem; color:var(--muted); flex-shrink:0; align-self:center; transition:color 0.2s, transform 0.2s; }
    .post-card:hover .post-arrow { color:var(--purple); transform:translateX(3px); }

    .empty-state { text-align:center; padding:80px 24px; color:var(--muted); font-size:0.95rem; }

    footer {
      border-top:1px solid var(--border); padding:32px 60px;
      display:flex; justify-content:space-between; align-items:center;
    }
    .footer-left { font-size:0.85rem; color:var(--muted); }
    .footer-left .hl { color:var(--purple); }
    .footer-links { display:flex; gap:24px; }
    .footer-links a { font-size:0.84rem; color:var(--muted); transition:color 0.2s; }
    .footer-links a:hover { color:var(--text); }

    @media (max-width:700px) {
      nav { padding:16px 20px; }
      .nav-links li:nth-child(n+3) { display:none; }
      .post-card { flex-direction:column; padding:20px; }
      .post-arrow { display:none; }
      footer { flex-direction:column; gap:16px; text-align:center; padding:24px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Travis Liu</a>
    <ul class="nav-links">
      <li><a href="index.html#projects">Projects</a></li>
      <li><a href="index.html#skills">Skills</a></li>
      <li><a href="index.html#about">About</a></li>
      <li><a href="blog.html" class="active">Blog</a></li>
      <li><a href="mailto:travisliu708@gmail.com" class="nav-cta">Contact</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <span class="page-label">Writing</span>
    <h1 class="page-title">The Blog</h1>
    <p class="page-sub">Thoughts on what I'm building, problems I've solved, and things I'm learning as a developer.</p>
  </div>

  <div class="tag-filter" id="tag-filter">
    <button class="filter-btn active" data-tag="all">All Posts</button>
  </div>

  <div class="post-list" id="post-list">
    <p style="color:var(--muted);">Loading posts…</p>
  </div>

  <footer>
    <div class="footer-left">Built by <span class="hl">Travis Liu</span> · © 2026</div>
    <div class="footer-links">
      <a href="https://github.com/liucidity" target="_blank" rel="noopener">GitHub</a>
      <a href="https://linkedin.com" target="_blank" rel="noopener">LinkedIn</a>
      <a href="mailto:travisliu708@gmail.com">Email</a>
    </div>
  </footer>

  <script src="posts-data.js"></script>
  <script>
    function renderPosts(tag) {
      const list = document.getElementById('post-list');
      const posts = tag === 'all' ? window.POSTS : window.POSTS.filter(p => p.tags?.some(t => t.toLowerCase() === tag.toLowerCase()));
      if (!posts || posts.length === 0) { list.innerHTML = '<div class="empty-state">No posts in this category yet.</div>'; return; }
      list.innerHTML = posts.map(p => `
        <a href="post.html?slug=${encodeURIComponent(p.slug)}" style="text-decoration:none;color:inherit;">
          <div class="post-card">
            <div class="post-card-left">
              <div class="post-meta">
                <span class="post-date">${new Date(p.date+'T00:00:00').toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</span>
                ${p.tags ? p.tags.map(t=>`<span class="post-tag-chip">${t}</span>`).join('') : ''}
              </div>
              <div class="post-title">${p.title}</div>
              <div class="post-excerpt">${p.excerpt}</div>
            </div>
            <div class="post-arrow">→</div>
          </div>
        </a>`).join('');
    }

    function buildFilters() {
      const filterEl = document.getElementById('tag-filter');
      const allTags = [...new Set(window.POSTS.flatMap(p => p.tags || []))];
      allTags.forEach(tag => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn'; btn.dataset.tag = tag; btn.textContent = tag;
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active'); renderPosts(tag);
        });
        filterEl.appendChild(btn);
      });
      document.querySelector('.filter-btn[data-tag="all"]').addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('.filter-btn[data-tag="all"]').classList.add('active');
        renderPosts('all');
      });
    }

    if (window.POSTS) { buildFilters(); renderPosts('all'); }
  </script>
</body>
</html>
