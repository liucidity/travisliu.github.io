<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Post – Travis Liu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0f0f13; --card:rgba(255,255,255,0.03); --border:rgba(255,255,255,0.08);
      --text:#f0f0f0; --muted:#9ca3af; --purple:#a78bfa; --blue:#60a5fa; --radius:16px;
      --prose-max:700px;
    }
    html { scroll-behavior:smooth; }
    body { font-family:'Inter',-apple-system,sans-serif; background:var(--bg); color:var(--text); line-height:1.6; min-height:100vh; }
    a { color:inherit; text-decoration:none; }

    nav {
      display:flex; justify-content:space-between; align-items:center;
      padding:18px 60px; background:rgba(15,15,19,0.80);
      backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
      border-bottom:1px solid var(--border);
      position:sticky; top:0; z-index:100;
    }
    .nav-logo {
      font-size:1.05rem; font-weight:700;
      background:linear-gradient(120deg,var(--purple),var(--blue));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .nav-links { display:flex; gap:28px; list-style:none; align-items:center; }
    .nav-links a { font-size:0.875rem; color:var(--muted); transition:color 0.2s; }
    .nav-links a:hover { color:var(--text); }
    .nav-cta {
      background:linear-gradient(135deg,#7c3aed,#3b82f6);
      color:#fff !important; padding:8px 18px !important;
      border-radius:8px; font-weight:600 !important; font-size:0.8rem !important;
    }

    .back-link { max-width:var(--prose-max); margin:0 auto; padding:40px 24px 0; }
    .back-link a { font-size:0.85rem; color:var(--muted); display:inline-flex; align-items:center; gap:6px; transition:color 0.2s; }
    .back-link a:hover { color:var(--purple); }

    .post-header { max-width:var(--prose-max); margin:0 auto; padding:36px 24px 40px; }
    .post-meta-row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:16px; }
    .post-date { font-size:0.78rem; color:var(--muted); }
    .post-tag-chip { background:rgba(167,139,250,0.10); color:var(--purple); font-size:0.7rem; padding:2px 10px; border-radius:999px; }
    .post-title { font-size:clamp(1.8rem,5vw,2.8rem); font-weight:800; line-height:1.15; letter-spacing:-0.025em; margin-bottom:16px; }
    .post-excerpt-lede { font-size:1.05rem; color:var(--muted); line-height:1.7; border-left:3px solid var(--purple); padding-left:18px; }

    .post-divider { max-width:var(--prose-max); margin:0 auto 48px; padding:0 24px; }
    .post-divider hr { border:none; border-top:1px solid var(--border); }

    .post-body {
      max-width:var(--prose-max); margin:0 auto; padding:0 24px 80px;
      font-family:'Merriweather',Georgia,serif; font-size:1rem; line-height:1.85; color:#d4d4d8;
    }
    .post-body h1,.post-body h2,.post-body h3,.post-body h4 { font-family:'Inter',sans-serif; color:var(--text); letter-spacing:-0.02em; margin:2.2em 0 0.8em; }
    .post-body h1 { font-size:1.9rem; font-weight:800; }
    .post-body h2 { font-size:1.45rem; font-weight:700; }
    .post-body h3 { font-size:1.2rem; font-weight:700; }
    .post-body p { margin-bottom:1.4em; }
    .post-body a { color:var(--blue); text-decoration:underline; text-underline-offset:3px; }
    .post-body a:hover { color:var(--purple); }
    .post-body strong { color:var(--text); font-weight:700; }
    .post-body em { color:#c4b5fd; }
    .post-body ul,.post-body ol { margin:0 0 1.4em 1.6em; }
    .post-body li { margin-bottom:0.5em; }
    .post-body blockquote {
      border-left:3px solid var(--purple); padding:12px 20px; margin:1.6em 0;
      background:rgba(167,139,250,0.06); border-radius:0 8px 8px 0;
      color:var(--muted); font-style:italic;
    }
    .post-body code {
      font-family:'Fira Code','Courier New',monospace;
      background:rgba(255,255,255,0.07); border:1px solid var(--border);
      border-radius:5px; padding:2px 7px; font-size:0.87em; color:#e879f9;
    }
    .post-body pre {
      background:rgba(255,255,255,0.04); border:1px solid var(--border);
      border-radius:12px; padding:20px 24px; overflow-x:auto; margin:1.6em 0;
    }
    .post-body pre code { background:none; border:none; padding:0; font-size:0.88rem; color:#c4b5fd; }
    .post-body hr { border:none; border-top:1px solid var(--border); margin:2.5em 0; }

    .post-footer-section { max-width:var(--prose-max); margin:0 auto; padding:0 24px 80px; }
    .post-footer-card {
      background:var(--card); border:1px solid var(--border);
      border-radius:var(--radius); padding:28px;
      display:flex; justify-content:space-between; align-items:center; gap:20px; flex-wrap:wrap;
    }
    .post-footer-card p { color:var(--muted); font-size:0.9rem; }
    .post-footer-card p strong { color:var(--text); }
    .btn-sm {
      display:inline-flex; align-items:center; gap:6px;
      padding:9px 20px; border-radius:8px; font-size:0.84rem; font-weight:600;
      background:linear-gradient(135deg,#7c3aed,#3b82f6); color:#fff; font-family:inherit;
      transition:all 0.2s;
    }
    .btn-sm:hover { opacity:0.85; transform:translateY(-1px); }

    .not-found { max-width:var(--prose-max); margin:100px auto; padding:0 24px; text-align:center; color:var(--muted); }
    .not-found h2 { font-size:2rem; margin-bottom:12px; color:var(--text); }

    footer {
      border-top:1px solid var(--border); padding:32px 60px;
      display:flex; justify-content:space-between; align-items:center;
    }
    .footer-left { font-size:0.85rem; color:var(--muted); }
    .footer-left .hl { color:var(--purple); }
    .footer-links { display:flex; gap:24px; }
    .footer-links a { font-size:0.84rem; color:var(--muted); transition:color 0.2s; }
    .footer-links a:hover { color:var(--text); }

    @media (max-width:700px) {
      nav { padding:16px 20px; }
      .nav-links li:nth-child(n+3) { display:none; }
      footer { flex-direction:column; gap:16px; text-align:center; padding:24px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Travis Liu</a>
    <ul class="nav-links">
      <li><a href="index.html#projects">Projects</a></li>
      <li><a href="index.html#skills">Skills</a></li>
      <li><a href="index.html#about">About</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="mailto:travisliu708@gmail.com" class="nav-cta">Contact</a></li>
    </ul>
  </nav>

  <div id="post-content"></div>

  <footer>
    <div class="footer-left">Built by <span class="hl">Travis Liu</span> · © 2026</div>
    <div class="footer-links">
      <a href="https://github.com/liucidity" target="_blank" rel="noopener">GitHub</a>
      <a href="https://linkedin.com" target="_blank" rel="noopener">LinkedIn</a>
      <a href="mailto:travisliu708@gmail.com">Email</a>
    </div>
  </footer>

  <script src="posts-data.js"></script>
  <script>
    function formatDate(d) {
      return new Date(d+'T00:00:00').toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
    }
    function renderPost() {
      const slug = new URLSearchParams(window.location.search).get('slug') || '';
      const container = document.getElementById('post-content');
      const post = window.POSTS?.find(p => p.slug === slug);
      if (!post) {
        container.innerHTML = `<div class="not-found"><h2>Post not found</h2><p>This post may have been moved or deleted.</p><br><a href="blog.html" style="color:var(--purple)">← Back to Blog</a></div>`;
        return;
      }
      document.title = `${post.title} – Travis Liu`;
      const html = typeof marked !== 'undefined' ? marked.parse(post.content.trim()) : post.content.replace(/\n/g,'<br>');
      container.innerHTML = `
        <div class="back-link"><a href="blog.html">← Back to Blog</a></div>
        <div class="post-header">
          <div class="post-meta-row">
            <span class="post-date">${formatDate(post.date)}</span>
            ${post.tags ? post.tags.map(t=>`<span class="post-tag-chip">${t}</span>`).join('') : ''}
          </div>
          <h1 class="post-title">${post.title}</h1>
          <p class="post-excerpt-lede">${post.excerpt}</p>
        </div>
        <div class="post-divider"><hr></div>
        <div class="post-body">${html}</div>
        <div class="post-footer-section">
          <div class="post-footer-card">
            <p><strong>Enjoyed this post?</strong><br>More writing about dev, projects, and things I'm figuring out.</p>
            <a href="blog.html" class="btn-sm">← All Posts</a>
          </div>
        </div>`;
    }
    renderPost();
  </script>
</body>
</html>
